name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Show Android SDK status
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms 2>/dev/null || true
          ls $ANDROID_HOME/build-tools 2>/dev/null || true

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build debug APK (fallback)
        if: failure()
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          set -e
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No APK found"; exit 1; fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          cp "$APK" "TermuXagent-${GITHUB_REF_NAME//\//-}.apk"
          echo "friendly=TermuXagent-${GITHUB_REF_NAME//\//-}.apk" >> $GITHUB_OUTPUT
          ls -la TermuXagent-*.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TermuXagent-apk
          path: ${{ steps.apk.outputs.friendly }}
          if-no-files-found: error
          retention-days: 90

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: TermuXagent (latest build)
          body: |
            # TermuXagent — latest build

            Built from commit `${{ github.sha }}` on `${{ github.ref_name }}`.

            ## Install
            1. Download the `.apk` below.
            2. On your phone, allow "Install unknown apps" for your browser/files app.
            3. Tap the file to install.

            ## First run
            1. Open TermuXagent.
            2. Tap ⚙️ → Settings.
            3. Enter API key + base URL, pick a model.
            4. (Optional) Enable Linux Environment — requires Termux + `pkg install proot`.
            5. (Optional) Enable Web Search.
            6. Go back to Chat, ask anything.

            ## For Linux env (maximum power)
            1. Install [Termux from F-Droid](https://f-droid.org/packages/com.termux/).
            2. In Termux: `pkg install proot`
            3. In TermuXagent Settings → Linux Environment → toggle ON.
            4. The AI can now `apk add python3 nodejs ruby gcc git` and run anything.
          files: ${{ steps.apk.outputs.friendly }}
          prerelease: false
          fail_on_unmatched_files: true
          draft: false
